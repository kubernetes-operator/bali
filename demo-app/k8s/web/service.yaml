# React WEB NodePort 서비스
# 브라우저에서 http://<노드IP>:30000 으로 직접 접근 가능하다

apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: demo-app
  labels:
    app: web
    tier: frontend
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 80
      # 30000 포트로 외부 노출
      # 접속 주소: http://<워커노드IP>:30000
      nodePort: 30000
      protocol: TCP
