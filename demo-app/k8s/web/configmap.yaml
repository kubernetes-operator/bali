# Nginx 설정 ConfigMap
# React 정적 파일 서빙 + /api/* 요청을 API Service로 프록시한다
# K8s 환경에서는 package.json의 proxy 설정 대신 Nginx 프록시를 사용한다

apiVersion: v1
kind: ConfigMap
metadata:
  name: web-nginx-config
  namespace: demo-app
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        # React 빌드 파일 루트 디렉토리
        root /usr/share/nginx/html;
        index index.html;

        # /api/* 요청을 FastAPI Service로 프록시
        # "api"는 K8s Service 이름 (ClusterIP DNS 자동 해석)
        location /api/ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # React Router 지원: 모든 경로를 index.html로 fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 정적 파일 캐싱 (JS, CSS, 이미지)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
