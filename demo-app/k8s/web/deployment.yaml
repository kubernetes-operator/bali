# React WEB Deployment
# Nginx로 React 앱을 서빙하고 /api/* 요청을 API Service로 프록시한다
# 레지스트리: registry.local.cloud:5000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: demo-app
  labels:
    app: web
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        tier: frontend
    spec:
      containers:
        - name: web
          image: registry.local.cloud:5000/demo-app-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80

          # Nginx 프록시 설정 파일을 ConfigMap에서 마운트한다
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

      # Nginx 설정 ConfigMap을 볼륨으로 연결
      volumes:
        - name: nginx-config
          configMap:
            name: web-nginx-config
