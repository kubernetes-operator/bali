# PostgreSQL 접속 정보 Secret
# 민감 정보(DB 계정/비밀번호)를 K8s Secret으로 관리한다
# 주의: 실운영 환경에서는 base64 인코딩된 값 대신 Sealed Secrets 또는
#       외부 Secret 관리 도구(Vault 등)를 사용할 것을 권장한다
#
# base64 인코딩 방법:
#   echo -n "demouser"     | base64  → ZGVtb3VzZXI=
#   echo -n "demopassword" | base64  → ZGVtb3Bhc3N3b3Jk
#   echo -n "demoapp"      | base64  → ZGVtb2FwcA==

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: demo-app
type: Opaque
data:
  # DB 사용자명: demouser
  POSTGRES_USER: ZGVtb3VzZXI=
  # DB 비밀번호: demopassword
  POSTGRES_PASSWORD: ZGVtb3Bhc3N3b3Jk
  # DB 이름: demoapp
  POSTGRES_DB: ZGVtb2FwcA==
