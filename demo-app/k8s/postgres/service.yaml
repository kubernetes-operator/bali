# PostgreSQL ClusterIP 서비스
# 클러스터 내부에서 "postgres" 호스트명으로 DB에 접근할 수 있게 한다
# API Pod의 DATABASE_URL: postgresql://user:pw@postgres:5432/demoapp
#                                                  ^^^^^^^^
#                                              이 Service 이름

apiVersion: v1
kind: Service
metadata:
  name: postgres          # API Pod에서 이 이름으로 DNS 조회한다
  namespace: demo-app
  labels:
    app: postgres
    tier: db
spec:
  # ClusterIP: 클러스터 내부에서만 접근 가능
  # DB는 외부 노출이 불필요하므로 ClusterIP가 적합하다
  type: ClusterIP
  selector:
    app: postgres          # 이 레이블을 가진 Pod로 트래픽을 전달한다
  ports:
    - name: postgres
      port: 5432            # Service 포트 (다른 Pod가 접근하는 포트)
      targetPort: 5432      # Pod 내부 컨테이너 포트
      protocol: TCP
