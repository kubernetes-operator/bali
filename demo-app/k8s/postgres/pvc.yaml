# PostgreSQL 데이터 영구 저장용 PersistentVolumeClaim
# Pod가 재시작되거나 재배포되어도 데이터가 유지된다
# StorageClass를 지정하지 않으면 클러스터 기본값을 사용한다

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: demo-app
  labels:
    app: postgres
    tier: db
spec:
  # ReadWriteOnce: 하나의 노드에서만 읽기/쓰기 가능
  # PostgreSQL은 단일 인스턴스이므로 RWO로 충분하다
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # 개발/테스트용 1Gi — 운영 환경에서는 용량을 늘릴 것
      storage: 1Gi
  # storageClassName을 명시하려면 아래 주석 해제
  storageClassName: nfs-nas-sc-main

