# API 환경변수 ConfigMap
# DB 접속 URL과 JWT 설정을 K8s ConfigMap으로 관리한다
# 민감하지 않은 설정값만 ConfigMap에 저장한다
# (비밀번호는 Secret으로 분리하는 것이 권장되지만 데모 환경에서는 간소화)

apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: demo-app
data:
  # postgres = K8s Service 이름 (ClusterIP DNS 자동 해석)
  DATABASE_URL: "postgresql://admin:password123@postgres:5432/demoapp"

  # JWT 토큰 만료 시간 (분)
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
