# FastAPI ClusterIP 서비스
# WEB Pod에서 "api" 호스트명으로 접근 가능하다
# 외부 직접 접근은 불가 (WEB을 통해서만 접근)

apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo-app
  labels:
    app: api
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
