# pytest 전역 설정 파일
# api/ 디렉토리에 위치해야 한다

[pytest]
# 테스트 파일 탐색 시작 경로
testpaths = tests

# 테스트 파일명 패턴
python_files = test_*.py

# 테스트 함수/클래스 패턴
python_classes = Test*
python_functions = test_*

# 추가 출력 옵션 — 실패 시 짧은 트레이스백
addopts = -v --tb=short

# api/ 루트를 sys.path에 추가 (conftest.py와 함께 이중 보장)
pythonpath = .
